  about_title: Hello, I’m Azmat
  about_subtitle: I’m a software engineer writing in public about what I build, break, measure, and learn.
  about_description: |
    This site is my working notebook for the technical side of life: performance investigations, architecture tradeoffs, deployment lessons, and the odd side project that teaches me something useful.

    I’m less interested in polished thought leadership than in honest field notes. If a post lives here, it usually came from a real incident, a stubborn bottleneck, or a build that finally started making sense after enough iteration.
