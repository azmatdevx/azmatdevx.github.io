<!-- begin header -->
<header class="header" id="top">
  <div class="header__inner">

    <!-- Left: Brand -->
    <a class="header__brand" href="{{ site.baseurl }}/">
      <svg width="32" height="32" viewBox="0 0 52 52" fill="none" aria-hidden="true">
        <rect width="52" height="52" rx="13" fill="#0C1018"/>
        <rect x="20" y="6"  width="12" height="12" rx="3.5" fill="#6DECCA"/>
        <rect x="12" y="22" width="9"  height="9"  rx="2.5" fill="#28906A"/>
        <rect x="31" y="22" width="9"  height="9"  rx="2.5" fill="#28906A"/>
        <rect x="7"  y="37" width="9"  height="9"  rx="2.5" fill="#1A6B48"/>
        <rect x="36" y="37" width="9"  height="9"  rx="2.5" fill="#1A6B48"/>
        <rect x="16" y="28" width="6"  height="6"  rx="2"   fill="#3DB38A"/>
        <rect x="30" y="28" width="6"  height="6"  rx="2"   fill="#3DB38A"/>
      </svg>
      <span class="header__wordmark-name">Azmat Mungur</span>
    </a>

    <!-- Center: Nav list (desktop only, collapses to dropdown on mobile) -->
    <nav class="main-nav" id="main-nav" aria-label="Main menu">
      <ul class="nav__list list-reset">
        {% for item in site.data.settings.menu_settings.menu_items %}
        <li class="nav__item">
          <a href="{{ item.url | relative_url }}" class="nav__link{% if page.url == item.url %} active-link{% endif %}">{{ item.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Right: Actions (search, theme toggle, CTA, hamburger) -->
    <div class="nav__actions">
      <div class="nav__search-wrap">
        <i class="fa-solid fa-magnifying-glass nav__search-icon"></i>
        <input type="text" id="nav-search-input" class="nav__search-input" placeholder="Search the journal..." autocomplete="off" aria-label="Search posts">
        <div class="nav__search-results" id="nav-results-container"></div>
      </div>
      <button class="toggle-theme nav__theme-toggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon theme-icon--dark"></i>
        <i class="fa-solid fa-sun theme-icon--light"></i>
      </button>
      {% if site.data.settings.cta_button.enable == true %}
      <a href="{% if site.data.settings.cta_button.cta_button_link %}{{ site.data.settings.cta_button.cta_button_link }}{% else %}#{% endif %}" class="button cta-button">{{ site.data.settings.cta_button.cta_button_text }}</a>
      {% endif %}
      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <div></div>
      </button>
    </div>

  </div>
</header>
<!-- end header -->
