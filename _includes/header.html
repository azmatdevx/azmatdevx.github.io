<!-- begin header -->
<header class="header" id="top">
  <div class="header__inner">

    <!-- Logo: left -->
    <a class="header__logo" href="{{ site.baseurl }}/" aria-label="{{ site.name }} home">
      <img src="{{ '/images/HeaderLogo.svg' | relative_url }}" alt="{{ site.name }}" class="header__logo-img">
    </a>

    <!-- Nav links: right -->
    <nav class="nav--desktop" aria-label="Primary navigation">
      <ul class="nav__list list-reset">
        {% for item in site.data.settings.menu_settings.menu_items %}
        <li class="nav__item">
          <a href="{{ item.url | relative_url }}" class="nav__link{% if page.url == item.url %} active-link{% endif %}">{{ item.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Mobile hamburger -->
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <div></div>
    </button>

  </div>

  <!-- Mobile dropdown nav -->
  <nav class="main-nav" id="main-nav" aria-label="Mobile navigation">
    <ul class="nav__list list-reset">
      {% for item in site.data.settings.menu_settings.menu_items %}
      <li class="nav__item">
        <a href="{{ item.url | relative_url }}" class="nav__link{% if page.url == item.url %} active-link{% endif %}">{{ item.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>

</header>

<script>
(function () {
  var header = document.getElementById('top');
  function onScroll() {
    header.classList.toggle('header--scrolled', window.scrollY > 20);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
})();
</script>
<!-- end header -->
