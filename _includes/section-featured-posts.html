{% assign post = site.posts.first %}
{% if post %}
<!-- begin featured-post -->
<section class="section featured-post animate">
  <div class="container">
    <div class="section__inner">
      <h2 class="screen-reader-text">Latest Post</h2>
      <div class="row">
        <div class="col col-12">
          {% include article.html class="article--big" %}
        </div>
      </div>
    </div>
  </div>
</section>
<!-- end featured-post -->
{% endif %}
