<a href="{{ post.url | relative_url }}" class="post-panel">
  {% if post.image %}
  <div class="post-panel__image">
    <img class="lazy" data-src="{{ post.image | relative_url }}" alt="{{ post.title }}">
  </div>
  {% endif %}
  <div class="post-panel__body">
    <p class="post-panel__date">{{ post.date | date: "%-d %b %Y" }}</p>
    <h2 class="post-panel__title">{{ post.title }}</h2>
    {% if post.description %}
    <p class="post-panel__excerpt">{{ post.description | truncate: 100 }}</p>
    {% endif %}
    {% if post.tags.size >= 1 %}
    <div class="post-panel__tags">
      {% for tag in post.tags limit:3 %}
      <span class="post-panel__tag">{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</a>
