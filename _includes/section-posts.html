{% if site.data.settings.blog.enable == true %}
<!-- begin section-posts -->
<section class="section section-posts animate">
  <div class="container">

    <div class="section__inner">
      <div class="section__info">
        <div class="section__head">
          <h2 class="section__title">{{ site.data.settings.blog.blog_title }}</h2>
        </div>
      </div>

      <div class="row grid" id="posts-grid">
      {% if site.posts.size > 0 %}
        {% for post in paginator.posts %}
          <div class="col col-4 col-d-6 col-t-12 animate grid__post" data-tags="{% for tag in post.tags %}{{ tag | slugify }} {% endfor %}">
            {% include article.html %}
          </div>
        {% endfor %}
      {% endif %}
      </div>

      {% include pagination.html %}
    </div>

  </div>
</section>
<!-- end section-posts -->
{% endif %}
