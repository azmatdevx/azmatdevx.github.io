<div class="article{% if include.class %} {{ include.class }}{% endif %}">
  {% if post.image %}
  <a href="{{ post.url | relative_url }}" class="article__image-link">
    <div class="article__image">
      <img class="lazy" data-src="{{ post.image | relative_url }}" alt="{{ post.title }}">
    </div>
  </a>
  {% endif %}

  <div class="article__content">
    {% if post.tags.size >= 1 %}
    <p class="article__category">{% for tag in post.tags limit:2 %}{% unless forloop.first %} <span class="article__sep">•</span> {% endunless %}{{ tag | upcase }}{% endfor %}</p>
    {% endif %}

    <h2 class="article__title">
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    </h2>

    <p class="article__date-stamp">{{ post.date | date: "%-d %b %Y" }}</p>
  </div>
</div>
