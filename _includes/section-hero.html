{% if site.data.settings.hero.enable == true %}
<!-- begin hero -->
<section class="hero hero--writing">
  <div class="container">
    <div class="hero__writing-head">

      <h1 class="hero__title">Field notes from the <em>engineering bench</em></h1>

      <p class="hero__description">Raw observations from production systems, side projects, and the decisions that only make sense after they've shipped.</p>

      <div class="hero__search-wrap">
        <i class="fa-solid fa-magnifying-glass hero__search-icon"></i>
        <input type="text" id="hero-search-input" class="hero__search-input" placeholder="Search the notes." autocomplete="off" aria-label="Search posts">
        <div class="hero__search-results" id="hero-results-container"></div>
      </div>

    </div>
  </div>
</section>
<!-- end hero -->
{% endif %}
